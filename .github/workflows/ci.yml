name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every version-sensitive tool is pinned via pip, never apt. apt versions drift
# between the runner image and a developer's machine, and a coverage or format
# gate that reports a different number locally than in CI is worse than no gate.
env:
  CLANG_TOOLS_VERSION: "18.1.8"
  GCOVR_VERSION: "8.6"

jobs:
  test:
    name: test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip
          python -m pip install pytest numpy qiskit qiskit_qasm3_import

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DQCDSL_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build --parallel

      - name: C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Python tests (incl. the Qiskit oracle)
        run: PYTHONPATH=build/python python -m pytest python/tests -v

  lint:
    name: format + tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip
          python -m pip install "clang-format==${CLANG_TOOLS_VERSION}" "clang-tidy==${CLANG_TOOLS_VERSION}"
          clang-format --version
          clang-tidy --version

      - name: clang-format (check only)
        run: |
          find include python tests bench \( -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Configure for compile_commands.json
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DQCDSL_BUILD_PYTHON=OFF

      - name: clang-tidy
        run: |
          clang-tidy -p build \
            tests/test_gate.cpp tests/test_circuit.cpp tests/test_statevector.cpp \
            tests/test_dag.cpp tests/test_passes.cpp tests/test_qasm3.cpp \
            tests/test_kernels.cpp tests/test_routing.cpp

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pinned gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip
          python -m pip install "gcovr==${GCOVR_VERSION}"
          gcovr --version

      - name: Configure with coverage
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQCDSL_COVERAGE=ON \
            -DQCDSL_BUILD_PYTHON=OFF

      - name: Build and test
        run: |
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Line coverage (minimum 90 percent)
        run: |
          gcovr --root . --filter 'include/qcdsl/' \
                --print-summary --fail-under-line 90 \
                --xml-pretty -o coverage.xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
