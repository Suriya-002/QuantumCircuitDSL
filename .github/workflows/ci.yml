name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip pytest
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build --parallel
      - name: C++ tests
        run: ctest --test-dir build --output-on-failure
      - name: Python tests
        run: PYTHONPATH=build/python python -m pytest python/tests -v

  lint:
    name: format + tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pinned clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip
          python -m pip install "clang-format==18.1.8" "clang-tidy==18.1.8"
      - name: clang-format (check only)
        run: |
          find include python tests \( -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror
      - name: Configure for compile_commands.json
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DQCDSL_BUILD_PYTHON=OFF
      - name: clang-tidy
        run: clang-tidy -p build tests/test_gate.cpp tests/test_circuit.cpp

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --upgrade pip gcovr
      - name: Configure with coverage
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQCDSL_COVERAGE=ON \
            -DQCDSL_BUILD_PYTHON=OFF
      - name: Build and test
        run: |
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure
      - name: Line coverage (gate at 90%)
        run: |
          gcovr --root . --filter 'include/qcdsl/' \
                --print-summary --fail-under-line 90 \
                --xml-pretty -o coverage.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml